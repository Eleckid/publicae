# netlify.toml — Configuration Netlify pour Publicae Mockup
# Deploiement : drag-and-drop ou git push

[build]
  publish = "."

# Headers de securite (CSP, X-Frame, etc.)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src https://fonts.gstatic.com; img-src 'self' https://picsum.photos https://fastly.picsum.photos https://www.w3schools.com data:; media-src 'self' https://www.w3schools.com; connect-src 'self'"

# Redirects : / → index.html (SPA-like fallback)
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
