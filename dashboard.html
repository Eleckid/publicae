<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Publicae</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-bg: #000000;
      --color-card: #111111;
      --color-card-alt: #1a1a1a;
      --color-border: #222222;
      --color-accent: #00ff00;
      --color-white: #ffffff;
      --color-gray: #888888;
      --color-gray-light: #cccccc;
      --color-gray-dark: #444444;
      --color-error: #ff4444;
      --color-warning: #ff8800;
      --color-info: #4d96ff;
      --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
  </style>
  <link rel="stylesheet" href="assets/css/global.css" />
</head>
<body class="bg-bg text-white font-sans min-h-screen">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[100] focus:bg-accent focus:text-bg focus:px-4 focus:py-2 focus:rounded-lg focus:font-semibold">Skip to content</a>
  <div id="sidebar-root"></div>
  <div id="topbar-root"></div>

  <main id="main-content" class="lg:ml-60 pt-14 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-6">

      <!-- KPI Stats -->
      <div id="stats-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <!-- Skeletons puis stats injectees par dashboard.js -->
      </div>

      <!-- Two-column layout -->
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Earnings chart (2/3) -->
        <div class="lg:col-span-2">
          <div class="bg-card border border-border rounded-xl p-5">
            <h2 class="font-mono text-sm text-gray uppercase tracking-wider mb-4">Earnings — Last 7 Days</h2>
            <div id="earnings-chart" class="bar-chart h-32">
              <!-- Barres injectees par dashboard.js -->
            </div>
          </div>
        </div>

        <!-- Announcements (1/3) -->
        <div>
          <div class="bg-card border border-border rounded-xl p-5">
            <h2 class="font-mono text-sm text-gray uppercase tracking-wider mb-4">Announcements</h2>
            <div id="announcements-list" class="space-y-3">
              <!-- Injecte par dashboard.js -->
            </div>
          </div>
        </div>

      </div>

      <!-- Recent posts -->
      <div class="mt-8">
        <h2 class="font-mono text-sm text-gray uppercase tracking-wider mb-4">Trending Posts</h2>
        <div id="trending-posts" class="space-y-4">
          <!-- Injecte par dashboard.js -->
        </div>
      </div>

    </div>
  </main>

  <div id="toast-root" class="fixed bottom-4 right-4 z-[60] flex flex-col gap-2" aria-live="polite"></div>
  <div id="modal-root" class="hidden"></div>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/mock-api.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/dashboard.js"></script>
</body>
</html>
