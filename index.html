<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Square — Publicae</title>

  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --color-bg: #000000;
      --color-card: #111111;
      --color-card-alt: #1a1a1a;
      --color-border: #222222;
      --color-accent: #00ff00;
      --color-white: #ffffff;
      --color-gray: #888888;
      --color-gray-light: #cccccc;
      --color-gray-dark: #444444;
      --color-error: #ff4444;
      --color-warning: #ff8800;
      --color-info: #4d96ff;
      --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
  </style>

  <!-- Global CSS (fonts, animations, custom utilities) -->
  <link rel="stylesheet" href="assets/css/global.css" />
</head>
<body class="bg-bg text-white font-sans min-h-screen">

  <!-- Skip nav (accessibilite) -->
  <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-2 focus:left-2 focus:z-[100] focus:bg-accent focus:text-bg focus:px-4 focus:py-2 focus:rounded-lg focus:font-semibold">
    Skip to content
  </a>

  <!-- Sidebar injection point -->
  <div id="sidebar-root"></div>

  <!-- TopBar injection point -->
  <div id="topbar-root"></div>

  <!-- Main content -->
  <main id="main-content" class="lg:ml-60 pt-14 min-h-screen">
    <div class="max-w-2xl mx-auto px-4 py-6">

      <!-- Post composer -->
      <div id="post-composer" class="bg-card border border-border rounded-xl p-4 mb-6">
        <div class="flex items-start gap-3">
          <div id="composer-avatar" class="w-10 h-10 rounded-full flex-shrink-0 flex items-center justify-center text-sm font-bold text-bg bg-accent"></div>
          <div class="flex-1">
            <textarea
              id="compose-input"
              class="w-full bg-transparent text-white text-sm placeholder-gray resize-none outline-none min-h-[60px]"
              placeholder="Share something with the community..."
              maxlength="500"
              aria-label="Write a post"
            ></textarea>
            <div class="flex items-center justify-between mt-3 pt-3 border-t border-border">
              <span id="char-count" class="text-xs text-gray font-mono">0/500</span>
              <button
                id="compose-submit"
                class="bg-accent text-bg font-semibold text-sm px-5 py-2 rounded-lg hover:bg-accent/90 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
                disabled
              >Post</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Feed tabs -->
      <div id="feed-tabs" class="mb-4"></div>

      <!-- Feed content -->
      <div id="feed-content" class="space-y-4">
        <!-- Skeletons puis posts injectes par feed.js -->
      </div>

      <!-- Load more -->
      <div id="feed-load-more" class="text-center py-6 hidden">
        <button class="text-accent font-mono text-sm hover:underline">Load more posts</button>
      </div>

    </div>
  </main>

  <!-- Toast container -->
  <div id="toast-root" class="fixed bottom-4 right-4 z-[60] flex flex-col gap-2" aria-live="polite"></div>

  <!-- Modal container -->
  <div id="modal-root" class="hidden"></div>

  <!-- Scripts (ordre : utils → store → mock-api → components → router → page) -->
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/mock-api.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/feed.js"></script>
</body>
</html>
